<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Location Voiture Maroc | DriveElite</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="top-bar">
  <select id="langSelect">
    <option value="fr">🇫🇷 FR</option>
    <option value="ar">🇲🇦 AR</option>
    <option value="en">🇬🇧 EN</option>
  </select>
  <select id="currencySelect">
    <option value="mad">MAD</option>
    <option value="eur">€ EUR</option>
    <option value="usd">$ USD</option>
  </select>
</div>

<div class="social-buttons">
  <a href="https://www.instagram.com/dakhla4rent?igsh=bXdnbGhldXN1dHZj&utm_source=qr" target="_blank" class="social-btn btn-instagram">
    <i class="fab fa-instagram"></i>
  </a>
  <a href="https://www.facebook.com/groups/1192633816125628/?ref=share&mibextid=NSMWBT" target="_blank" class="social-btn btn-facebook">
    <i class="fab fa-facebook-f"></i>
  </a>
</div>

<div id="page1" class="hero">
  <h1>Drive<span style="color:#d4af37;">Elite</span></h1>
  <div class="hero-subtitle" id="heroSubtitle">Location de véhicules premium au Maroc</div>
  <div class="form-box">
    <form id="bookingForm">
      <input type="date" id="startDatePick" required placeholder="Date de début">
      <input type="date" id="endDatePick" required placeholder="Date de fin">
      <button type="submit" class="btn-gold" id="exploreBtn"><i class="fas fa-arrow-right me-2"></i> Explorer nos véhicules</button>
    </form>
  </div>
</div>

<div id="page2">
  <div class="close-icon" id="closePage2Btn"><i class="fas fa-times"></i></div>
  <div class="container">
    <div class="row">
      <div class="col-lg-8">
        <div class="filter-btn-group">
          <button class="filter-btn active" data-filter="all" id="filterAllBtn"><i class="fas fa-car me-1"></i> Tous</button>
          <button class="filter-btn" data-filter="small" id="filterSmallBtn"><i class="fas fa-car-side me-1"></i> Économique</button>
          <button class="filter-btn" data-filter="medium" id="filterMediumBtn"><i class="fas fa-caravan me-1"></i> Confort</button>
          <button class="filter-btn" data-filter="big" id="filterBigBtn"><i class="fas fa-truck-pickup me-1"></i> SUV & Premium</button>
        </div>
        <div id="carsContainer" class="row g-4"></div>
      </div>
      <div class="col-lg-4">
        <div class="sticky-box">
          <h4 class="mb-3" id="reservationTitle"><i class="fas fa-clipboard-list me-2 text-gold"></i> Réservation</h4>
          <div>
            <label class="text-gold" id="fullNameLabel">Nom complet <span class="text-danger">*</span></label>
            <input type="text" id="fullName" class="form-control mb-3" placeholder="Votre nom">
            <label class="text-gold" id="emailLabel">Email <span class="text-danger">*</span></label>
            <input type="email" id="optionalEmail" class="form-control mb-3" placeholder="exemple@email.com">
            <label class="text-gold" id="phoneLabel">WhatsApp <span class="text-danger">*</span></label>
            <input type="tel" id="optionalPhone" class="form-control mb-3" placeholder="+212 6XX XXX XXX">
            <label class="text-gold" id="startDateLabel">Date de début</label>
            <input type="date" id="summaryStart" class="form-control mb-2">
            <label class="text-gold" id="endDateLabel">Date de fin</label>
            <input type="date" id="summaryEnd" class="form-control mb-3">
          </div>
          <hr class="border-secondary">
          <p id="daysCount"><i class="fas fa-calendar-week me-2"></i> Jours: 0</p>
          <p class="price-tag" id="totalPriceDisplay">Total: 0 MAD</p>
          <div class="d-grid gap-2 mt-3">
            <button id="confirmWhatsappBtn" class="btn btn-success" disabled><i class="fab fa-whatsapp me-2"></i> <span id="confirmBtnText">Confirmer via WhatsApp</span></button>
            <button id="closeCatalogueBtn" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i> <span id="backBtnText">Retour</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="main.js" defer></script>
</body>
</html>
